<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="PixelKeep.nl — Tech, Privacy, Homelab, Games, RPG, Retro. Under construction." />
  <meta name="theme-color" content="#07110d" />
  <title>PixelKeep.nl</title>
  <link rel="icon" href="assets/privacy-crest.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>

  <main class="shell">
    <section class="hero" aria-label="PixelKeep.nl under construction">
      <div class="scanlines" aria-hidden="true"></div>

      <div class="kicker">
        <span class="led"></span>
        <span>BBS NODE 01</span>
        <span>PIXELKEEP.NL</span>
        <span class="terminal-status">SYSOP: ONLINE</span>
      </div>

      <img class="hero-logo" src="assets/pixelkeep-under-construction.png" alt="PixelKeep.nl under construction" />

      <nav class="topics" aria-label="Planned topics">
        <span>TECH</span><i></i>
        <span>PRIVACY</span><i></i>
        <span>HOMELAB</span><i></i>
        <span>GAMES</span><i></i>
        <span>RPG</span><i></i>
        <span>RETRO</span>
      </nav>

      <div class="terminal" role="status" aria-live="polite">
        <div class="terminal-bar">
          <span></span><span></span><span></span>
          <strong>pixelkeep@bbs:~</strong>
        </div>
        <pre id="terminal-output"></pre>
      </div>
    </section>

    <footer class="footer">
      <span>NO TRACKERS</span>

      <div class="musicbox">
        <select id="track-select" aria-label="Select module">
          <option value="assets/module-keep-gate.wav">KEEP GATE</option>
          <option value="assets/module-guild-hall.wav">GUILD HALL</option>
          <option value="assets/module-archive-vault.wav">ARCHIVE VAULT</option>
        </select>
        <button id="music-toggle" class="mini-player" type="button" aria-pressed="true" title="Toggle music">
          <span class="eq" aria-hidden="true"><b></b><b></b><b></b></span>
          <span id="music-label">STOP</span>
        </button>
      </div>

      <a class="github" href="https://github.com/pixelkeep" rel="me noopener" target="_blank" aria-label="GitHub PixelKeep">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.17c-3.34.73-4.04-1.42-4.04-1.42-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.74.08-.74 1.21.09 1.85 1.25 1.85 1.25 1.07 1.84 2.81 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.67-.3-5.47-1.34-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23A11.5 11.5 0 0 1 12 5.65c1.02 0 2.05.14 3.01.41 2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.69.83.57A12 12 0 0 0 12 .5Z"/></svg>
        github.com/pixelkeep
      </a>
    </footer>
  </main>

  <audio id="track" src="assets/module-keep-gate.wav" preload="auto" autoplay loop playsinline></audio>
  <script src="script.js"></script>
</body>
</html>
